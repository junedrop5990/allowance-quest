<!DOCTYPE html>
<!-- このファイルをブラウザで開いて、ボタンを押すとアイコンPNGを生成できます -->
<html><body style="background:#111;color:#fff;font-family:sans-serif;padding:20px">
<h2>アイコン生成ツール</h2>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<button onclick="generate()" style="padding:12px 24px;font-size:16px;cursor:pointer">アイコンを生成してダウンロード</button>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.18;
  // 背景
  ctx.fillStyle = '#1a1f30';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();
  // グラデーション
  const grad = ctx.createRadialGradient(s*0.4, s*0.35, 0, s*0.5, s*0.5, s*0.7);
  grad.addColorStop(0, '#2a2a6e');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();
  // 剣（縦）
  ctx.strokeStyle = '#9fa8da'; ctx.lineWidth = s*0.055; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(s*0.5, s*0.15); ctx.lineTo(s*0.5, s*0.74); ctx.stroke();
  // 剣（横）
  ctx.lineWidth = s*0.043;
  ctx.beginPath(); ctx.moveTo(s*0.31, s*0.43); ctx.lineTo(s*0.69, s*0.43); ctx.stroke();
  // 刃先
  ctx.fillStyle = '#ffd600';
  ctx.beginPath(); ctx.moveTo(s*0.5, s*0.11); ctx.lineTo(s*0.46, s*0.2); ctx.lineTo(s*0.5, s*0.17); ctx.lineTo(s*0.54, s*0.2); ctx.closePath(); ctx.fill();
  // 星
  ctx.fillStyle = '#ffd600'; ctx.globalAlpha = 0.9;
  ctx.beginPath(); ctx.arc(s*0.74, s*0.25, s*0.043, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.7; ctx.fillStyle = '#7986cb';
  ctx.beginPath(); ctx.arc(s*0.26, s*0.76, s*0.031, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}
function generate() {
  ['192','512'].forEach(sz => {
    const c = document.getElementById('c'+sz);
    drawIcon(c);
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = 'icon-'+sz+'.png';
    a.click();
  });
  // apple-touch-icon (180x180)
  const ca = document.createElement('canvas'); ca.width = ca.height = 180;
  document.body.appendChild(ca); drawIcon(ca);
  const aa = document.createElement('a');
  aa.href = ca.toDataURL('image/png'); aa.download = 'apple-touch-icon.png'; aa.click();
  ca.remove();
}
</script>
</body></html>
